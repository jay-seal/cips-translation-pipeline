name: CIPS Translation — Reconstruct

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: >
          R2 public URL of the source document (PPTX or DOCX).
          Leave empty to read from inputs/extraction_manifest.json.
        required: false
        default: ''
        type: string
      translations:
        description: >
          Filename of the Agent 3 translations JSON in inputs/.
          Example: agent3_m1_fr-fr_merged.json
        required: true
        default: 'agent3_output.json'
        type: string
      failure_threshold:
        description: >
          Maximum tolerated NO_MATCH rate before the workflow exits with an error.
          Leave blank to use the format default (0.40 for PPTX, 0.20 for DOCX).
          Override for documents with known inaccessible content (e.g. 0.30).
        required: false
        default: ''
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  reconstruct:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # Required to commit outputs/latest-translation.json

    steps:
      # -----------------------------------------------------------------------
      - name: Check out repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # -----------------------------------------------------------------------
      - name: Install dependencies
        run: pip install python-pptx python-docx requests

      # -----------------------------------------------------------------------
      - name: Ensure input and output directories exist
        run: mkdir -p inputs outputs

      # -----------------------------------------------------------------------
      - name: Resolve source URL
        run: |
          URL="${{ github.event.inputs.source_url }}"
          if [ -z "$URL" ] && [ -f "inputs/extraction_manifest.json" ]; then
            URL=$(python3 -c "import json; print(json.load(open('inputs/extraction_manifest.json')).get('source_url',''))")
            echo "Read source_url from manifest: $URL"
          fi
          if [ -z "$URL" ]; then
            echo "ERROR: No source_url provided and none found in extraction_manifest.json"
            exit 1
          fi
          echo "SOURCE_URL=$URL" >> $GITHUB_ENV

      # -----------------------------------------------------------------------
      - name: Download source document from R2
        run: |
          URL="${{ env.SOURCE_URL }}"
          BASENAME=$(basename "$URL")
          FILENAME=$(echo "$BASENAME" | sed 's/^[0-9]*-//')
          EXT="${FILENAME##*.}"
          EXT_LOWER=$(echo "$EXT" | tr '[:upper:]' '[:lower:]')
          echo "Source URL : $URL"
          echo "Filename   : $FILENAME"
          echo "Extension  : $EXT_LOWER"
          curl --fail -L -o "inputs/source.${EXT_LOWER}" "$URL"
          echo "SOURCE_EXT=${EXT_LOWER}"    >> $GITHUB_ENV
          echo "SOURCE_STEM=${FILENAME%.*}" >> $GITHUB_ENV
          ls -lh inputs/

      # -----------------------------------------------------------------------
      - name: Check required files exist
        run: |
          TRANSLATIONS="inputs/${{ github.event.inputs.translations }}"
          if [ ! -f "$TRANSLATIONS" ]; then
            echo "ERROR: ${TRANSLATIONS} not found."
            exit 1
          fi
          if [ ! -f "inputs/source.${{ env.SOURCE_EXT }}" ]; then
            echo "ERROR: inputs/source.${{ env.SOURCE_EXT }} not found."
            exit 1
          fi
          echo "Source      : inputs/source.${{ env.SOURCE_EXT }}"
          echo "Translations: ${TRANSLATIONS}"

      # -----------------------------------------------------------------------
      - name: Determine output filename
        id: naming
        run: |
          LOCALE=$(python3 -c "
          import json
          with open('inputs/${{ github.event.inputs.translations }}') as f:
              data = json.load(f)
          summary = data.get('translation_summary', {})
          meta    = data.get('document_metadata', {})
          print(summary.get('locale_code') or meta.get('target_locale', 'TRANSLATED'))
          ")
          OUTPUT="${{ env.SOURCE_STEM }}_${LOCALE}.${{ env.SOURCE_EXT }}"
          echo "locale=${LOCALE}"           >> $GITHUB_OUTPUT
          echo "output_filename=${OUTPUT}"  >> $GITHUB_OUTPUT
          echo "Output file will be: ${OUTPUT}"

      # -----------------------------------------------------------------------
      # Select reconstruction script and failure threshold based on format.
      # PPTX: cips_reconstruct.py      default threshold 0.40
      # DOCX: cips_reconstruct_docx.py default threshold 0.20
      # -----------------------------------------------------------------------
      - name: Run reconstruction
        run: |
          EXT="${{ env.SOURCE_EXT }}"

          if [ "$EXT" = "pptx" ]; then
            SCRIPT="cips_reconstruct.py"
            DEFAULT_THRESHOLD="0.40"
          elif [ "$EXT" = "docx" ]; then
            SCRIPT="cips_reconstruct_docx.py"
            DEFAULT_THRESHOLD="0.20"
          else
            echo "ERROR: Unsupported file extension '${EXT}'. Expected pptx or docx."
            exit 1
          fi

          OVERRIDE="${{ github.event.inputs.failure_threshold }}"
          THRESHOLD="${OVERRIDE:-$DEFAULT_THRESHOLD}"
          echo "Script    : $SCRIPT"
          echo "Threshold : $THRESHOLD"

          if [ -f "inputs/agent4_output.json" ]; then
            echo "Agent 4 QA file found — passing to reconstruction script."
            python "$SCRIPT" \
              --source        "inputs/source.${EXT}" \
              --translations  "inputs/${{ github.event.inputs.translations }}" \
              --qa            inputs/agent4_output.json \
              --output        "outputs/${{ steps.naming.outputs.output_filename }}" \
              --failure-threshold "$THRESHOLD"
          else
            echo "No agent4_output.json found — running without QA file."
            python "$SCRIPT" \
              --source        "inputs/source.${EXT}" \
              --translations  "inputs/${{ github.event.inputs.translations }}" \
              --output        "outputs/${{ steps.naming.outputs.output_filename }}" \
              --failure-threshold "$THRESHOLD"
          fi

      # -----------------------------------------------------------------------
      - name: Upload translated file to R2
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:    auto
        run: |
          OUTPUT_FILE="outputs/${{ steps.naming.outputs.output_filename }}"
          R2_KEY="translations/${{ steps.naming.outputs.locale }}/${{ steps.naming.outputs.output_filename }}"
          R2_ENDPOINT="https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com"

          echo "Uploading: ${OUTPUT_FILE} → ${R2_KEY}"
          aws s3 cp "$OUTPUT_FILE" "s3://cips-translation-inputs/${R2_KEY}" \
            --endpoint-url "$R2_ENDPOINT"

          # Generate 7-day presigned URL. Multiline env var syntax handles
          # URL special characters (ampersands, equals signs) safely.
          PRESIGNED=$(aws s3 presign "s3://cips-translation-inputs/${R2_KEY}" \
            --expires-in 604800 \
            --endpoint-url "$R2_ENDPOINT")

          echo "DOWNLOAD_URL<<URLEOF" >> $GITHUB_ENV
          echo "$PRESIGNED"          >> $GITHUB_ENV
          echo "URLEOF"              >> $GITHUB_ENV

          EXPIRES=$(date -u -d "+7 days" "+%Y-%m-%dT%H:%M:%SZ")
          echo "EXPIRES_AT=${EXPIRES}"   >> $GITHUB_ENV
          echo "COMPLETED=$(date -u '+%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_ENV

          echo "Upload complete. Link expires: ${EXPIRES}"

      # -----------------------------------------------------------------------
      - name: Write translation status JSON
        run: |
          python3 - << 'PYEOF'
import json, os

# Derive match report path from output filename
output_filename = os.environ["OUTPUT_FILENAME"]
base = output_filename.rsplit(".", 1)[0]
report_path = f"outputs/{base}_match_report.json"

try:
    with open(report_path) as f:
        report = json.load(f)
    handle_rate = report.get("handle_rate_pct", 0)
    no_match    = report.get("summary", {}).get("NO_MATCH", 0)
    total       = report.get("summary", {}).get("translated", 0)
except Exception as ex:
    print(f"Warning: could not read match report ({ex}) — using defaults.")
    handle_rate, no_match, total = 0, 0, 0

status = {
    "source_filename":     os.environ["SOURCE_STEM"] + "." + os.environ["SOURCE_EXT"],
    "locale":              os.environ["LOCALE"],
    "document_type":       os.environ["SOURCE_EXT"],
    "completed_at":        os.environ["COMPLETED"],
    "handle_rate_pct":     handle_rate,
    "no_match_count":      no_match,
    "total_segments":      total,
    "translated_filename": output_filename,
    "download_url":        os.environ["DOWNLOAD_URL"],
    "expires_at":          os.environ["EXPIRES_AT"],
}

os.makedirs("outputs", exist_ok=True)
with open("outputs/latest-translation.json", "w") as f:
    json.dump(status, f, indent=2)

print("Status JSON written:")
print(json.dumps(status, indent=2))
PYEOF
        env:
          OUTPUT_FILENAME: ${{ steps.naming.outputs.output_filename }}
          SOURCE_STEM:     ${{ env.SOURCE_STEM }}
          SOURCE_EXT:      ${{ env.SOURCE_EXT }}
          LOCALE:          ${{ steps.naming.outputs.locale }}
          COMPLETED:       ${{ env.COMPLETED }}
          EXPIRES_AT:      ${{ env.EXPIRES_AT }}

      # -----------------------------------------------------------------------
      - name: Commit translation status to repository
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs/latest-translation.json
          git diff --staged --quiet \
            && echo "No changes to commit." \
            || git commit -m "chore: update translation status (${{ steps.naming.outputs.locale }}) [skip ci]"
          git push

      # -----------------------------------------------------------------------
      - name: Upload outputs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: "${{ steps.naming.outputs.output_filename }}"
          path: "outputs/"
          retention-days: 7
          if-no-files-found: error
