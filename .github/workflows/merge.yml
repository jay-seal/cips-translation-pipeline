name: Merge Translation Batches

# ---------------------------------------------------------------------------
# Merges Agent 3 batch JSON files from a single job's folder in inputs/ into
# one merged JSON. Every run operates on exactly one job_id, so batch files
# from unrelated documents or earlier runs can never be picked up by
# mistake, regardless of how many other job folders exist in the repo.
#
# Can be triggered two ways:
#
# 1. Manual / legacy — pass batch_files and output_file explicitly:
#      job_id      : 20260702T105032Z-16234567890
#      batch_files : agent3_pages_001_001.json agent3_pages_002_002.json
#      output_file : agent3_merged_FR-FR_pages.json
#
# 2. Automated (from Opal Merge Trigger Agent) — pass job_id, locale_code
#    and document_type. The workflow auto-discovers all matching batch
#    files inside inputs/{job_id}/ and constructs the output filename
#    automatically.
#      job_id        : 20260702T105032Z-16234567890
#      locale_code   : FR-FR
#      document_type : docx
# ---------------------------------------------------------------------------

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: >
          Required. The job folder under inputs/ to operate on, e.g.
          20260702T105032Z-16234567890. This is the value extract.yml
          generated and committed the batch files under.
        required: true
        type: string

      locale_code:
        description: >
          Target locale code, e.g. FR-FR. Used for auto-discovery and to
          construct the output filename. Required when batch_files is empty.
        required: false
        default: 'FR-FR'
        type: string

      document_type:
        description: >
          Source document format: pptx or docx. Used for auto-discovery.
        required: false
        default: 'pptx'
        type: choice
        options:
          - pptx
          - docx

      batch_files:
        description: >
          Optional. Space-separated Agent 3 batch JSON filenames inside
          inputs/{job_id}/, in page order. Leave empty to auto-discover all
          matching files. Example: agent3_pages_001_001.json agent3_pages_002_002.json
        required: false
        default: ''
        type: string

      output_file:
        description: >
          Optional. Output merged filename written to inputs/{job_id}/.
          Leave empty to auto-generate from locale_code and document_type.
          Example: agent3_merged_FR-FR_pages.json
        required: false
        default: ''
        type: string

      run_reconstruct:
        description: >
          Trigger the reconstruction workflow automatically after merge?
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

      source_url:
        description: >
          (Only used if run_reconstruct is true.)
          R2 public URL of the source PPTX or DOCX.
        required: false
        default: ''
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  merge:
    name: Merge batch JSONs
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Required to commit the merged JSON
      actions: write    # Required to dispatch reconstruct.yml when run_reconstruct is true

    steps:
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # -----------------------------------------------------------------------
      # Confirm the job folder actually exists before doing anything else.
      - name: Validate job folder
        run: |
          JOB_DIR="inputs/${{ github.event.inputs.job_id }}"
          if [ ! -d "$JOB_DIR" ]; then
            echo "ERROR: Job folder $JOB_DIR does not exist."
            echo "Check that job_id matches the folder extract.yml created."
            exit 1
          fi
          echo "Job folder confirmed: $JOB_DIR"

      # -----------------------------------------------------------------------
      # Resolve which batch files to merge and what to name the output, both
      # scoped to inputs/{job_id}/. If batch_files is empty, auto-discover
      # from that folder only using document_type. If output_file is empty,
      # auto-generate from locale_code + document_type.
      - name: Resolve batch files and output filename
        id: resolve
        run: |
          JOB_ID="${{ github.event.inputs.job_id }}"
          JOB_DIR="inputs/${JOB_ID}"
          BATCH_FILES="${{ github.event.inputs.batch_files }}"
          OUTPUT_FILE="${{ github.event.inputs.output_file }}"
          DOC_TYPE="${{ github.event.inputs.document_type }}"
          LOCALE="${{ github.event.inputs.locale_code }}"

          # Auto-discover batch files within this job's folder only
          if [ -z "$BATCH_FILES" ]; then
            echo "No batch_files provided — auto-discovering from ${JOB_DIR}/..."
            if [ "$DOC_TYPE" = "docx" ]; then
              PATTERN="${JOB_DIR}/agent3_pages_*.json"
            else
              PATTERN="${JOB_DIR}/agent3_slides_*.json"
            fi
            DISCOVERED=$(ls $PATTERN 2>/dev/null | sort | xargs -I{} basename {} | tr '\n' ' ' | sed 's/ $//')
            if [ -z "$DISCOVERED" ]; then
              echo "ERROR: No matching batch files found in ${JOB_DIR}/ for pattern $PATTERN"
              exit 1
            fi
            BATCH_FILES="$DISCOVERED"
            echo "Auto-discovered: $BATCH_FILES"
          fi

          # Auto-generate output filename if not provided
          if [ -z "$OUTPUT_FILE" ]; then
            if [ "$DOC_TYPE" = "docx" ]; then
              OUTPUT_FILE="agent3_merged_${LOCALE}_pages.json"
            else
              OUTPUT_FILE="agent3_merged_${LOCALE}_slides.json"
            fi
            echo "Auto-generated output filename: $OUTPUT_FILE"
          fi

          # Build --inputs argument with full paths inside the job folder
          INPUT_ARGS=""
          for f in $BATCH_FILES; do
            INPUT_ARGS="$INPUT_ARGS ${JOB_DIR}/$f"
          done

          echo "batch_files=$BATCH_FILES"          >> "$GITHUB_OUTPUT"
          echo "input_args=$INPUT_ARGS"            >> "$GITHUB_OUTPUT"
          echo "output_file=$OUTPUT_FILE"          >> "$GITHUB_OUTPUT"
          echo "output_path=${JOB_DIR}/$OUTPUT_FILE" >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      - name: Merge batch JSONs
        run: |
          python cips_merge_batches.py \
            --inputs ${{ steps.resolve.outputs.input_args }} \
            --output ${{ steps.resolve.outputs.output_path }}

      # -----------------------------------------------------------------------
      - name: Commit merged JSON to repository
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f "${{ steps.resolve.outputs.output_path }}"

          if git diff --cached --quiet; then
            echo "Nothing new to commit — merged file is unchanged."
            exit 0
          fi

          git commit -m "chore: merge translation batches into ${{ steps.resolve.outputs.output_file }}

          Job ID:  ${{ github.event.inputs.job_id }}
          Locale:  ${{ github.event.inputs.locale_code }}
          Format:  ${{ github.event.inputs.document_type }}
          Batches: ${{ steps.resolve.outputs.batch_files }}

          Triggered by: ${{ github.actor }}"

          ATTEMPTS=0
          MAX_ATTEMPTS=5
          until git push; do
            ATTEMPTS=$((ATTEMPTS + 1))
            if [ "$ATTEMPTS" -ge "$MAX_ATTEMPTS" ]; then
              echo "ERROR: Push failed after ${MAX_ATTEMPTS} attempts."
              exit 1
            fi
            echo "Push rejected (attempt ${ATTEMPTS}/${MAX_ATTEMPTS}) — another job likely pushed first. Rebasing and retrying..."
            sleep $((RANDOM % 5 + 2))
            git pull --rebase origin main
          done

      # -----------------------------------------------------------------------
      - name: Trigger reconstruction workflow
        if: ${{ github.event.inputs.run_reconstruct == 'true' && github.event.inputs.source_url != '' }}
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner:       context.repo.owner,
              repo:        context.repo.repo,
              workflow_id: 'reconstruct.yml',
              ref:         context.ref,
              inputs: {
                job_id:       '${{ github.event.inputs.job_id }}',
                source_url:   '${{ github.event.inputs.source_url }}',
                translations: '${{ steps.resolve.outputs.output_file }}',
              }
            });
            core.info('Reconstruction workflow triggered.');
