name: CIPS Translation — Extract

# ---------------------------------------------------------------------------
# Extracts all text from a source PPTX or DOCX file using python-pptx /
# python-docx and commits one Agent 1-format JSON file per batch to a
# job-scoped folder under inputs/.
#
# Every run gets its own folder: inputs/{job_id}/, where job_id is a
# timestamp + GitHub run ID (e.g. 20260702T105032Z-16234567890). This keeps
# batch files from different documents, locales, or repeated runs from ever
# colliding with each other during merge auto-discovery, no matter how many
# jobs have been run before. A separate cleanup.yml workflow removes job
# folders older than the retention window.
#
# Because extraction happens directly in python-pptx, source_text values
# are guaranteed to match exactly what the reconstruction scripts read —
# eliminating the hallucination and smart-quote mismatch issues that occur
# when an LLM reads a binary file via URL.
#
# After committing the batch JSONs, the workflow optionally triggers the
# Opal translation pipeline via webhook.
#
# Example inputs:
#   source_url    : https://[r2-url]/source.pptx
#   locale_code   : FR-FR
#   document_type : pptx
#   batch_size    : 20
#   trigger_opal  : true
# ---------------------------------------------------------------------------

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: 'R2 public URL of the source PPTX or DOCX'
        required: true
        type: string
      locale_code:
        description: 'Target locale code (e.g. FR-FR)'
        required: true
        default: 'FR-FR'
        type: string
      document_type:
        description: 'Source document format'
        required: true
        type: choice
        options:
          - pptx
          - docx
      batch_size:
        description: 'Slides or pages per batch (default 20)'
        required: false
        default: '20'
        type: string
      trigger_opal:
        description: 'Trigger the Opal translation workflow after extraction?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  extract:
    name: Extract text from source document
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # -----------------------------------------------------------------------
      - name: Check out repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # -----------------------------------------------------------------------
      - name: Install dependencies
        run: pip install python-pptx python-docx requests

      # -----------------------------------------------------------------------
      # Generate a unique, self-describing job ID for this run. The timestamp
      # prefix lets cleanup.yml determine a folder's age just by reading its
      # name, with no need to inspect git history.
      - name: Generate job ID
        id: job
        run: |
          JOB_ID="$(date -u +%Y%m%dT%H%M%SZ)-${{ github.run_id }}"
          echo "job_id=${JOB_ID}" >> "$GITHUB_OUTPUT"
          echo "Job ID: ${JOB_ID}"

      # -----------------------------------------------------------------------
      - name: Ensure directories exist
        run: mkdir -p "inputs/${{ steps.job.outputs.job_id }}" outputs

      # -----------------------------------------------------------------------
      - name: Download source document from R2
        run: |
          URL="${{ github.event.inputs.source_url }}"
          BASENAME=$(basename "$URL")
          FILENAME=$(echo "$BASENAME" | sed 's/^[0-9]*-//' | python3 -c "import sys,urllib.parse; print(urllib.parse.unquote(sys.stdin.read().strip()))")
          EXT="${FILENAME##*.}"
          EXT_LOWER=$(echo "$EXT" | tr '[:upper:]' '[:lower:]')
          echo "Downloading: $FILENAME"
          curl --fail -L -o "inputs/source.${EXT_LOWER}" "$URL"
          echo "SOURCE_EXT=${EXT_LOWER}"    >> $GITHUB_ENV
          echo "SOURCE_FILENAME=${FILENAME}" >> $GITHUB_ENV
          ls -lh inputs/

      # -----------------------------------------------------------------------
      - name: Extract text from source document
        run: |
          python cips_extract.py \
            --source          "inputs/source.${{ env.SOURCE_EXT }}" \
            --output-dir      "inputs/${{ steps.job.outputs.job_id }}/" \
            --locale          "${{ github.event.inputs.locale_code }}" \
            --document-type   "${{ github.event.inputs.document_type }}" \
            --batch-size      "${{ github.event.inputs.batch_size }}" \
            --source-filename "${{ env.SOURCE_FILENAME }}" \
            --source-url      "${{ github.event.inputs.source_url }}"

      # -----------------------------------------------------------------------
      # Record the job ID inside the manifest itself for traceability, then
      # read back the values needed for the webhook payload below.
      - name: Read and annotate extraction manifest
        id: manifest
        run: |
          MANIFEST="inputs/${{ steps.job.outputs.job_id }}/extraction_manifest.json"

          python3 -c "
          import json
          path = '${MANIFEST}'
          m = json.load(open(path))
          m['job_id'] = '${{ steps.job.outputs.job_id }}'
          json.dump(m, open(path, 'w'), indent=2)
          "

          BATCH_COUNT=$(python3 -c "import json; print(json.load(open('${MANIFEST}'))['batch_count'])")
          TOTAL_PAGES=$(python3 -c "import json; print(json.load(open('${MANIFEST}'))['total_pages'])")
          BATCH_FILES=$(python3 -c "import json; print(' '.join(json.load(open('${MANIFEST}'))['batch_files']))")

          echo "batch_count=${BATCH_COUNT}"   >> "$GITHUB_OUTPUT"
          echo "total_pages=${TOTAL_PAGES}"   >> "$GITHUB_OUTPUT"
          echo "batch_files=${BATCH_FILES}"   >> "$GITHUB_OUTPUT"
          echo "Extracted ${BATCH_COUNT} batches covering ${TOTAL_PAGES} pages"

      # -----------------------------------------------------------------------
      - name: Commit batch JSONs to repository
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "inputs/${{ steps.job.outputs.job_id }}/"
          git diff --cached --quiet \
            && echo "No new extraction files to commit." \
            || git commit -m \
                "chore: extract text from ${{ env.SOURCE_FILENAME }}

          Job ID:  ${{ steps.job.outputs.job_id }}
          Locale:  ${{ github.event.inputs.locale_code }}
          Format:  ${{ github.event.inputs.document_type }}
          Batches: ${{ steps.manifest.outputs.batch_count }}
          Pages:   ${{ steps.manifest.outputs.total_pages }}
          Batch size: ${{ github.event.inputs.batch_size }}

          Triggered by: ${{ github.actor }}"
          git push

      # -----------------------------------------------------------------------
      # Trigger the Opal translation workflow via webhook.
      # Requires OPAL_WEBHOOK_URL and OPAL_WEBHOOK_KEY repository secrets.
      # github_raw_base now points into this job's own subfolder, so the
      # Prep Agent and JSON Loader need no changes — they simply read from
      # wherever github_raw_base points.
      # -----------------------------------------------------------------------
      - name: Trigger Opal translation workflow
        if: ${{ github.event.inputs.trigger_opal == 'true' }}
        run: |
          GITHUB_RAW_BASE="https://raw.githubusercontent.com/${{ github.repository }}/main/inputs/${{ steps.job.outputs.job_id }}/"
          BATCH_FILES_JSON=$(python3 -c "
          import json
          m = json.load(open('inputs/${{ steps.job.outputs.job_id }}/extraction_manifest.json'))
          print(json.dumps(m['batch_files']))
          ")
          curl --fail -X POST "${{ secrets.OPAL_WEBHOOK_URL }}" \
            -H "Authorization: Bearer ${{ secrets.OPAL_WEBHOOK_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"job_id\":          \"${{ steps.job.outputs.job_id }}\",
              \"total_pages\":     ${{ steps.manifest.outputs.total_pages }},
              \"batch_size\":      ${{ github.event.inputs.batch_size }},
              \"locale_code\":     \"${{ github.event.inputs.locale_code }}\",
              \"document_type\":   \"${{ github.event.inputs.document_type }}\",
              \"source_url\":      \"${{ github.event.inputs.source_url }}\",
              \"github_raw_base\": \"${GITHUB_RAW_BASE}\",
              \"batch_files\":     ${BATCH_FILES_JSON},
              \"bridge_url\":      \"${{ secrets.BRIDGE_URL }}\",
              \"bridge_token\":    \"${{ secrets.BRIDGE_TOKEN }}\"
            }"
          echo "Opal workflow triggered."

      # -----------------------------------------------------------------------
      - name: Summary
        run: |
          echo "Extraction complete."
          echo "  Job ID  : ${{ steps.job.outputs.job_id }}"
          echo "  Batches : ${{ steps.manifest.outputs.batch_count }}"
          echo "  Pages   : ${{ steps.manifest.outputs.total_pages }}"
          echo "  Files   : ${{ steps.manifest.outputs.batch_files }}"
